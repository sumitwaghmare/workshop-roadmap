<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deploy Tool</title>
  <meta name="description" content="Lightweight deployment tool for syncing files across targets" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <h1>Deploy Tool</h1>
      </div>
      <div class="header-status" id="globalStatus">
        <span class="status-dot idle"></span>
        <span class="status-text">Ready</span>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Config Card -->
    <section class="card" id="configCard">
      <div class="card-header" data-toggle="configBody">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Configuration
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="card-body" id="configBody">
        <div class="config-grid">
          <div class="config-item">
            <label>Source</label>
            <div class="config-value mono" id="cfgSource">—</div>
          </div>
          <div class="config-item full-width">
            <label>Targets</label>
            <ul class="tag-list" id="cfgTargets"></ul>
          </div>
          <div class="config-item">
            <label>Excluded Files</label>
            <ul class="tag-list tags-muted" id="cfgExFiles"></ul>
          </div>
          <div class="config-item">
            <label>Excluded Dirs</label>
            <ul class="tag-list tags-muted" id="cfgExDirs"></ul>
          </div>
          <div class="config-item">
            <label>Subfolders</label>
            <ul class="tag-list" id="cfgSubs"></ul>
          </div>
        </div>
      </div>
    </section>

    <!-- Actions -->
    <section class="actions-bar">
      <button class="btn btn-preview" id="btnPreview">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Preview Changes
      </button>
      <button class="btn btn-deploy" id="btnDeploy" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
        Deploy
      </button>
      <button class="btn btn-log" id="btnLogs">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        View Logs
      </button>
    </section>

    <!-- Output Panel -->
    <section class="card output-card" id="outputCard" style="display:none;">
      <div class="card-header">
        <div class="card-title" id="outputTitle">Output</div>
        <button class="btn-icon" id="btnClearOutput" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="output-panels" id="outputPanels"></div>
      </div>
    </section>
  </main>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <h2>Confirm Deployment</h2>
      <p>This will copy files to <strong id="modalTargetCount">0</strong> target(s). This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="btnModalCancel">Cancel</button>
        <button class="btn btn-deploy" id="btnModalConfirm">Yes, Deploy</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
